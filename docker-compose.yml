version: '3.8'

services:
  api:
    build: .
    container_name: facturaai-api
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PADDLE_VL_API_URL=${PADDLE_VL_API_URL:-https://c6vceb62c4n8zfaf.aistudio-app.com/layout-parsing}
      - PADDLE_VL_TOKEN=${PADDLE_VL_TOKEN}
      - OCR_LANGUAGES=en,es
      - LOG_LEVEL=INFO
    volumes:
      - ./src:/app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: facturaai-network
