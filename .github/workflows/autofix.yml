name: autofix

on:
  pull_request:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Auto-fix linting issues
      - name: Run ruff auto-fix
        run: |
          pip install ruff
          ruff check --fix .

      # Auto-format code
      - name: Run black formatter
        run: |
          pip install black
          black --line-length 100 .

      # Commit and push fixes
      - name: Create PR with fixes
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "style: auto-fix linting and formatting"
          title: "Auto-fix: Linting & Formatting"
          branch: autofix/linting-fixes
          delete-branch: true
          labels: |
            automated
            automated-changes
